name: release

# Publishes to PyPI via Trusted Publishing (OIDC — no API tokens stored).
# Triggered by pushing a version tag, e.g. `git tag v1.1.0 && git push --tags`.
#
# PyPI-side config (one-time, done by the project owner):
#   Trusted Publisher → owner: fiftynotai, repo: fifty-agent-sdk,
#   workflow: release.yml, environment: pypi.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the environment named in the PyPI Trusted Publisher config.
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
